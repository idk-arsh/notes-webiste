<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Tracker — Voice Logger</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0d11;
      --surface: #13161d;
      --surface2: #1a1f2a;
      --border: #222836;
      --accent: #4fffb0;
      --accent2: #00cfff;
      --warn: #ff6b6b;
      --text: #e8eaf0;
      --muted: #6b7494;
      --recording: #ff4757;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(79,255,176,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 10% 80%, rgba(0,207,255,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      width: 100%;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 48px;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(79,255,176,0.25);
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* Config bar */
    .config-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .config-bar label {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .config-bar input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      width: 90px;
    }

    .config-bar input:focus { outline: none; border-color: var(--accent); }

    .config-sep { width: 1px; height: 32px; background: var(--border); }

    .date-display {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
    }

    /* Voice recorder card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-body { padding: 24px; }

    /* Mic button area */
    .mic-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
    }

    .mic-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      position: relative;
    }

    .mic-btn:hover {
      background: rgba(79,255,176,0.08);
      transform: scale(1.05);
    }

    .mic-btn.recording {
      border-color: var(--recording);
      color: var(--recording);
      animation: pulse-ring 1.2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
      70% { box-shadow: 0 0 0 20px rgba(255,71,87,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
    }

    .mic-label {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .mic-label.recording { color: var(--recording); }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 36px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .waveform.active { opacity: 1; }

    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--recording);
      animation: wave-anim 0.8s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { animation-delay: 0.3s; }
    .wave-bar:nth-child(7) { animation-delay: 0.2s; }
    .wave-bar:nth-child(8) { animation-delay: 0.1s; }
    .wave-bar:nth-child(9) { animation-delay: 0s; }

    @keyframes wave-anim {
      0%, 100% { height: 6px; }
      50% { height: 28px; }
    }

    /* Transcript area */
    .transcript-area {
      width: 100%;
      min-height: 130px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      margin-top: 16px;
      transition: border-color 0.2s;
    }

    .transcript-area:focus { outline: none; border-color: var(--accent); }

    .transcript-area::placeholder { color: var(--muted); }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 11px 22px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover { background: #3de8a0; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-loading {
      background: var(--surface2);
      color: var(--muted);
      cursor: wait;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Output section */
    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: none;
    }

    .output-card.visible { display: block; }

    .output-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .copy-btn {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .copy-btn:hover { background: rgba(79,255,176,0.1); }
    .copy-btn.copied { background: var(--accent); color: #000; }

    .output-content {
      padding: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.8;
      color: #b0bcd4;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 480px;
      overflow-y: auto;
    }

    /* Saved entries */
    .history-section {
      margin-top: 32px;
    }

    .history-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .history-item:hover { border-color: var(--accent2); }

    .history-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
      white-space: nowrap;
      padding-top: 2px;
    }

    .history-preview {
      font-size: 13px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .history-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .history-del:hover { opacity: 1; color: var(--warn); }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      color: var(--text);
      z-index: 100;
      transition: transform 0.3s ease, opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }

    .badge-green { background: rgba(79,255,176,0.12); color: var(--accent); }
    .badge-blue  { background: rgba(0,207,255,0.12);  color: var(--accent2); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">🎙️</div>
    <div class="header-text">
      <h1>Daily Tracker Voice Logger</h1>
      <p>Speak your day → AI formats it → paste into your spreadsheet</p>
    </div>
  </div>

  <!-- Config bar -->
  <div class="config-bar">
    <label>Last S.NO</label>
    <input type="number" id="lastSNo" value="279" min="1" title="Last serial number in your tracker"/>
    <div class="config-sep"></div>
    <label>Date</label>
    <input type="text" id="trackDate" placeholder="e.g. 3/4/2026" style="width:110px"/>
    <div class="config-sep"></div>
    <label>Hours/day</label>
    <input type="number" id="hoursPerDay" value="8" min="1" max="12" style="width:70px"/>
    <div class="date-display" id="todayDisplay"></div>
  </div>

  <!-- Voice Card -->
  <div class="card">
    <div class="card-header">
      <span style="color: var(--accent)">●</span> Voice Input
      <span class="badge badge-green">Browser Speech Recognition — No API Key</span>
    </div>
    <div class="card-body">

      <div class="mic-area">
        <button class="mic-btn" id="micBtn" title="Click to start/stop recording">🎤</button>
        <div class="mic-label" id="micLabel">Click to Start Recording</div>
        <div class="waveform" id="waveform">
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:6px"></div>
        </div>
      </div>

      <textarea class="transcript-area" id="transcript"
        placeholder="Or type/paste your raw day summary here — e.g. 'Morning: read HHS-FDA docs. 10am standup. Call with JD on website and Databricks. Worked on USDA FSIS write-up. Farewell call for Rakesh at 1:30. Continued HTML capability page. Updated proposal automation.'">
      </textarea>

      <div class="actions">
        <button class="btn btn-primary" id="formatBtn">
          ✨ Format as Tracker Rows
        </button>
        <button class="btn btn-ghost" id="clearBtn">Clear</button>
        <button class="btn btn-ghost" id="appendBtn">➕ Append New Session</button>
      </div>

    </div>
  </div>

  <!-- Output Card -->
  <div class="output-card" id="outputCard">
    <div class="output-header">
      <span class="output-title">📋 Formatted Tracker Rows — Paste Ready</span>
      <button class="copy-btn" id="copyBtn">Copy All</button>
    </div>
    <div class="output-content" id="outputContent"></div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">
      Saved Sessions
      <span class="history-count" id="historyCount">0</span>
    </div>
    <div id="historyList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let isRecording   = false;
  let savedText     = '';   // all committed final text so far
  let sessions      = JSON.parse(localStorage.getItem('tracker_sessions') || '[]');

  // ── DOM ───────────────────────────────────────────────────────────────────
  const micBtn        = document.getElementById('micBtn');
  const micLabel      = document.getElementById('micLabel');
  const waveform      = document.getElementById('waveform');
  const transcriptEl  = document.getElementById('transcript');
  const formatBtn     = document.getElementById('formatBtn');
  const clearBtn      = document.getElementById('clearBtn');
  const appendBtn     = document.getElementById('appendBtn');
  const outputCard    = document.getElementById('outputCard');
  const outputContent = document.getElementById('outputContent');
  const copyBtn       = document.getElementById('copyBtn');
  const historyList   = document.getElementById('historyList');
  const historyCount  = document.getElementById('historyCount');
  const todayDisplay  = document.getElementById('todayDisplay');
  const toast         = document.getElementById('toast');

  // ── Date ──────────────────────────────────────────────────────────────────
  const today    = new Date();
  const todayStr = `${today.getMonth()+1}/${today.getDate()}/${today.getFullYear()}`;
  document.getElementById('trackDate').value = todayStr;
  todayDisplay.textContent = `Today: ${todayStr}`;

  // ── Speech API check ──────────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.innerHTML = '🚫';
    micBtn.disabled  = true;
    micBtn.style.cssText += 'border-color:var(--warn);color:var(--warn)';
    micLabel.innerHTML = 'Use <strong>Chrome</strong> or <strong>Edge</strong> — speech recognition not available here.';
  }

  // ── Core: single-shot recognition session ─────────────────────────────────
  // Instead of continuous=true (which is flaky on GitHub Pages),
  // we use continuous=false and restart manually after each session.
  // Every time a session ends we chain a new one if still recording.
  function runSession() {
    if (!isRecording) return;

    const rec = new SR();
    rec.continuous      = false;   // ← key fix: single utterance per session
    rec.interimResults  = true;
    rec.lang            = 'en-US';
    rec.maxAlternatives = 1;

    rec.onresult = (event) => {
      let interim = '';
      for (let i = 0; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          savedText += t + ' ';
        } else {
          interim = t;
        }
      }
      // Update textarea live
      transcriptEl.value = (savedText + interim).trim();
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    };

    rec.onend = () => {
      // Ensure textarea always reflects what we have
      transcriptEl.value = savedText.trim();
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      // Chain next session if still recording
      if (isRecording) {
        setTimeout(runSession, 100);
      }
    };

    rec.onerror = (e) => {
      if (e.error === 'no-speech') {
        // Normal silence — session will end and restart automatically
        return;
      }
      if (e.error === 'not-allowed' || e.error === 'permission-denied') {
        stopRecording();
        showToast('❌ Microphone permission denied.');
        micLabel.innerHTML = '❌ Blocked — allow mic in browser settings then refresh.';
        return;
      }
      // For network / aborted errors just let onend restart
    };

    try {
      rec.start();
    } catch (e) {
      // Already started or other error — retry after short delay
      setTimeout(() => { if (isRecording) runSession(); }, 300);
    }
  }

  // ── Start / Stop ──────────────────────────────────────────────────────────
  async function startRecording() {
    // Ask for permission first so user sees the browser dialog
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      showToast('❌ Mic access denied — allow microphone and try again.');
      micLabel.innerHTML = '❌ Mic blocked. Click 🔒 in address bar → allow microphone → refresh.';
      return;
    }

    // Seed savedText with whatever is already in the textarea
    savedText   = transcriptEl.value.trim();
    if (savedText) savedText += ' ';
    isRecording = true;

    micBtn.classList.add('recording');
    micBtn.innerHTML = '⏹️';
    micLabel.textContent = '🔴 Recording... speak naturally. Click mic to stop.';
    micLabel.classList.add('recording');
    waveform.classList.add('active');

    runSession();
  }

  function stopRecording() {
    isRecording = false;

    micBtn.classList.remove('recording');
    micBtn.innerHTML = '🎤';
    micLabel.textContent = '✅ Done! Edit above if needed, then click Format.';
    micLabel.classList.remove('recording');
    waveform.classList.remove('active');

    // Final flush to textarea
    transcriptEl.value = savedText.trim();
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  micBtn.onclick = () => {
    if (!SR) return;
    isRecording ? stopRecording() : startRecording();
  };

  // ── Format ────────────────────────────────────────────────────────────────
  formatBtn.onclick = async () => {
    const raw = transcriptEl.value.trim();
    if (!raw) { showToast('Nothing to format — speak or type first.'); return; }

    const lastSNo  = parseInt(document.getElementById('lastSNo').value)  || 279;
    const dateVal  = document.getElementById('trackDate').value.trim()   || todayStr;
    const hoursDay = parseFloat(document.getElementById('hoursPerDay').value) || 8;

    formatBtn.innerHTML = '<div class="spinner"></div> Formatting...';
    formatBtn.classList.replace('btn-primary', 'btn-loading');
    formatBtn.disabled = true;

    const systemPrompt =
`You are a work tracker formatter. Convert raw summaries into tab-separated rows.

FORMAT (tab-separated, include header):
S. NO	Date	Tasks handled	Status	Comments / Challenges	Category	Impact	From	To	TIME

RULES:
- Continue S.NO from the number given (increment each row)
- Status = "Completed" always
- Category: "Production" (work output), "Meeting" (calls/standups), "Knowledge" (reading/reviewing), "Training"
- Impact: quantified e.g. "Improved compliance by ~15%", "Shipley score improved to 9.2", "Reduced rework by ~30%"
- Times: HH:MM:SS 24h, business hours 8:00–18:00 range
- TIME column: H:MM duration (e.g. 1:30, 0:45)
- Each day MUST total EXACTLY ${hoursDay * 60} minutes. Multiple days = each exactly ${hoursDay}:00
- Deep work 1–2.5h, standups 0:15–0:30, calls 0:30–1:00, quick tasks 0:15–0:30
- Implicit lunch gap ~12:00–13:00 (no row)
- Default date if none mentioned: ${dateVal}
- Output ONLY the tab-separated table. No markdown, no explanations.`;

    const userPrompt =
`Last S.NO: ${lastSNo}
Date: ${dateVal}
Hours/day: ${hoursDay}

Raw notes:
${raw}

Format into tracker rows now.`;

    try {
      const res  = await fetch('https://api.anthropic.com/v1/messages', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model:      'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system:     systemPrompt,
          messages:   [{ role: 'user', content: userPrompt }]
        })
      });
      const data   = await res.json();
      const result = data.content?.[0]?.text?.trim() || '';
      if (!result) throw new Error('empty');

      outputContent.textContent = result;
      outputCard.classList.add('visible');

      // Auto-bump last S.NO
      const dataRows = result.split('\n').filter(r => /^\d+\t/.test(r));
      if (dataRows.length) {
        const n = parseInt(dataRows[dataRows.length-1].split('\t')[0]);
        if (!isNaN(n)) document.getElementById('lastSNo').value = n;
      }

      // Save session
      const sess = { id: Date.now(), date: dateVal, raw, formatted: result, savedAt: new Date().toLocaleString() };
      sessions.unshift(sess);
      if (sessions.length > 20) sessions.pop();
      localStorage.setItem('tracker_sessions', JSON.stringify(sessions));
      renderHistory();
      showToast('✓ Done! Click Copy All to grab your rows.');

    } catch (err) {
      outputContent.textContent = fallback(raw, lastSNo, dateVal, hoursDay);
      outputCard.classList.add('visible');
      showToast('Used fallback template — edit impacts/times as needed.');
    }

    formatBtn.innerHTML = '✨ Format as Tracker Rows';
    formatBtn.classList.replace('btn-loading', 'btn-primary');
    formatBtn.disabled = false;
  };

  // ── Fallback ──────────────────────────────────────────────────────────────
  function fallback(raw, lastSNo, dateVal, hoursDay) {
    const lines    = raw.split(/[.\n!?]+/).map(l => l.trim()).filter(l => l.length > 6);
    const total    = hoursDay * 60;
    const perTask  = Math.floor(total / Math.max(lines.length, 1));
    let sno = lastSNo + 1, cur = 8 * 60;
    const pad = n => String(n).padStart(2,'0');
    const toHMS = m => `${pad(Math.floor(m/60))}:${pad(m%60)}:00`;
    const toDur = m => `${Math.floor(m/60)}:${pad(m%60)}`;
    const rows = ['S. NO\tDate\tTasks handled\tStatus\tComments / Challenges\tCategory\tImpact\tFrom\tTo\tTIME'];
    lines.forEach((line, i) => {
      const from = cur;
      const dur  = i === lines.length-1 ? total-(cur-8*60) : perTask;
      cur += dur;
      if (cur >= 12*60 && cur < 13*60 && i < lines.length-2) cur = 13*60;
      const cat = /call|standup|meeting/i.test(line) ? 'Meeting' : 'Production';
      rows.push([sno++, dateVal, line.charAt(0).toUpperCase()+line.slice(1),
        'Completed', 'Task completed as part of daily workstream', cat,
        'Improved output quality and efficiency',
        toHMS(from), toHMS(Math.min(cur, 18*60)), toDur(dur)].join('\t'));
    });
    return rows.join('\n');
  }

  // ── Copy ──────────────────────────────────────────────────────────────────
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(outputContent.textContent).then(() => {
      copyBtn.textContent = '✓ Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy All'; copyBtn.classList.remove('copied'); }, 2000);
    });
  };

  // ── Clear / Add Day ────────────────────────────────────────────────────────
  clearBtn.onclick = () => {
    transcriptEl.value = '';
    savedText = '';
    outputCard.classList.remove('visible');
    micLabel.textContent = 'Click to Start Recording';
  };

  appendBtn.onclick = () => {
    if (isRecording) stopRecording();
    const cur = transcriptEl.value.trim();
    const next = cur + (cur ? '\n\n--- New Day ---\n' : '');
    transcriptEl.value = next;
    savedText = next;
    transcriptEl.focus();
    showToast('Separator added. Record or type next day below it.');
  };

  // ── History ───────────────────────────────────────────────────────────────
  function renderHistory() {
    historyCount.textContent = sessions.length;
    historyList.innerHTML = sessions.length === 0
      ? '<div class="empty-state">No saved sessions yet. Format your first day to see it here.</div>'
      : sessions.map(s => `
          <div class="history-item" onclick="loadSession(${s.id})">
            <div class="history-date">${s.date}<br><span style="color:var(--muted);font-size:10px">${s.savedAt}</span></div>
            <div class="history-preview">${s.raw.slice(0,110).replace(/\n/g,' ')}…</div>
            <button class="history-del" onclick="deleteSession(event,${s.id})">✕</button>
          </div>`).join('');
  }

  window.loadSession = id => {
    const s = sessions.find(x => x.id === id);
    if (!s) return;
    transcriptEl.value = s.raw;
    savedText = s.raw;
    outputContent.textContent = s.formatted;
    outputCard.classList.add('visible');
    window.scrollTo({ top:0, behavior:'smooth' });
    showToast('Session loaded.');
  };

  window.deleteSession = (e, id) => {
    e.stopPropagation();
    sessions = sessions.filter(s => s.id !== id);
    localStorage.setItem('tracker_sessions', JSON.stringify(sessions));
    renderHistory();
  };

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
  }

  renderHistory();
</script>
</body>
</html>
